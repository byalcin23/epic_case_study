services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  app:
    image: bahadir23/epic_petstore_api:v002
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/appdb
    networks:
      - app-network

  api-tests:
    image: postman/newman:alpine
    command: run /etc/newman/petstore_collection.json --working-dir /etc/newman
    volumes:
      - ./postman:/etc/newman
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
